    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
    <!-- Embedded CSS -->
    <style>
        /* --- Global Styles & Reset --- */
        html,
        body {
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
            background-color: #f0f2f5;
        }

        .view {
            display: none;
            width: 100%;
            height: 100%;
            overflow-y: auto;
            flex-direction: column;
        }

        .view.active {
            display: flex;
        }

        /* Toggle Switch Style */
        .toggle-checkbox:checked+.toggle-label {
            background-color: #34D399;
        }

        .toggle-checkbox:checked+.toggle-label::after {
            transform: translateX(100%);
        }

        .toggle-label::after {
            content: '';
            position: absolute;
            width: 1.25rem;
            height: 1.25rem;
            border-radius: 50%;
            background-color: white;
            top: 2px;
            left: 2px;
            transition: transform 0.2s ease-in-out;
        }

        /* Card Flip Styles */
        .card {
            perspective: 1000px;
            cursor: pointer;
        }

        .card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            transition: transform 0.6s;
            transform-style: preserve-3d;
            border-radius: 8px;
        }

        .card.is-flipped .card-inner {
            transform: rotateY(180deg);
        }

        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .card-front {
            background-color: white;
            transform: rotateY(180deg);
            border: 1px solid #ccc;
            font-size: 4rem;
            line-height: 1;
        }

        .card-back {
            background-color: #60A5FA;
            color: white;
            border: 1px solid #3B82F6;
            font-size: 2.5rem;
        }

        .card.fade-out {
            opacity: 0;
            transition: opacity 0.5s ease-out;
            cursor: default;
            pointer-events: none;
        }

        /* Game Over Modal Styles */
        .modal {
            display: none;
        }

        .modal.active {
            display: flex;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        @keyframes scaleIn {
            from {
                transform: scale(0.9);
                opacity: 0;
            }

            to {
                transform: scale(1);
                opacity: 1;
            }
        }

        .modal.active {
            animation: fadeIn 0.3s ease-out forwards;
        }

        .modal.active>div {
            animation: scaleIn 0.3s ease-out forwards;
        }

        /* Font size button */
        .font-size-btn {
            width: 2.5rem;
            height: 2.5rem;
        }

        /* View padding */
        .view>* {
            padding-left: 1rem;
            padding-right: 1rem;
        }

        .view>header,
        .view>footer {
            padding-left: 0;
            padding-right: 0;
        }

        #gameView>main {
            padding-bottom: 1rem;
        }

        /* Records View Specific Styles */
        #recordsList li {
            background-color: white;
            padding: 0.75rem 1rem;
            margin-bottom: 0.5rem;
            border-radius: 0.375rem;
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.05);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }

        #recordsList li .details {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            margin-right: 1rem;
            flex-grow: 1;
        }

        #recordsList li .date {
            font-size: 0.875rem;
            color: #6B7280;
            white-space: nowrap;
            margin-top: 0.25rem;
        }

        #recordsList li .difficulty-badge {
            font-size: 0.75rem;
            font-weight: 600;
            padding: 0.125rem 0.5rem;
            border-radius: 0.25rem;
            margin-right: 0.5rem;
            color: white;
        }

        .badge-easy {
            background-color: #34D399;
        }

        .badge-normal {
            background-color: #A5B4FC;
        }

        .badge-slightly-hard {
            background-color: #60A5FA;
        }

        .badge-hard {
            background-color: #FBBF24;
        }

        .badge-expert {
            background-color: #F87171;
        }

        .badge-demon {
            background-color: #A78BFA;
        }
    </style>
</head>

            // --- Navigation Function ---
            function navigateToView(targetViewId) { views.forEach(v => v.classList.toggle('active', v.id === targetViewId)); gameState.currentView = targetViewId; console.log(`Navigated: ${targetViewId}`); if (targetViewId === 'gameView') initGame(); else if (targetViewId === 'recordsView') displayRecords(); else stopTimer(); }

            if (settingsBackBtn) settingsBackBtn.addEventListener('click', () => navigateToView('homeView')); if (settingSoundToggle) settingSoundToggle.addEventListener('change', e => { gameState.soundEnabled = e.target.checked; saveSettings(); }); if (settingMusicToggle) settingMusicToggle.addEventListener('change', e => { gameState.musicEnabled = e.target.checked; saveSettings(); }); if (settingContrastToggle) settingContrastToggle.addEventListener('change', e => { alert('待實現'); e.target.checked = !e.target.checked; }); if (clearSettingsRecordsBtn) clearSettingsRecordsBtn.addEventListener('click', clearAllRecords); if (aboutBtn) aboutBtn.addEventListener('click', () => alert('v1.0'));

            // --- Record Management Functions ---
            function getRecords() { try { const r = localStorage.getItem(RECORDS_STORAGE_KEY); return r ? JSON.parse(r) : []; } catch (e) { console.error(e); return []; } } function saveRecord(rec) { try { const rs = getRecords(); rs.push(rec); rs.sort((a, b) => b.timestamp - a.timestamp); localStorage.setItem(RECORDS_STORAGE_KEY, JSON.stringify(rs)); } catch (e) { console.error(e); } }
            function displayRecords() { const rs = getRecords(); recordsList.innerHTML = ''; const hasRecords = rs.length > 0; noRecordsMsg.classList.toggle('hidden', !hasRecords); clearRecordsBtn.classList.toggle('opacity-50', !hasRecords); clearRecordsBtn.classList.toggle('cursor-not-allowed', !hasRecords); clearRecordsBtn.disabled = !hasRecords; if (hasRecords) { rs.forEach(rec => { const li = document.createElement('li'); const di = difficultyMap[rec.difficulty] || { name: rec.difficulty, badge: 'bg-gray-400' }; const dt = new Date(rec.timestamp).toLocaleDateString('zh-TW'); li.innerHTML = `<div class="details"><span class="text-lg font-semibold flex items-center"><span class="difficulty-badge ${di.badge}">${di.name}</span> 時間: ${rec.timeFormatted}</span><span class="text-md text-gray-700">步數: ${rec.moves}</span></div><span class="date">${dt}</span>`; recordsList.appendChild(li); }); } }
            function clearAllRecords() { if (confirm('確定清除所有紀錄？')) { try { localStorage.removeItem(RECORDS_STORAGE_KEY); if (gameState.currentView === 'recordsView') displayRecords(); alert('紀錄已清除！'); } catch (e) { alert('清除失敗'); } } }
            if (clearRecordsBtn) clearRecordsBtn.addEventListener('click', clearAllRecords); if (recordsBackBtn) recordsBackBtn.addEventListener('click', () => navigateToView('homeView'));

            // --- Game Logic ---
            function initGame() { switch (gameState.difficulty) { case 'easy': gameState.cardCount = 6; break; case 'normal': gameState.cardCount = 8; break; case 'slightly-hard': gameState.cardCount = 10; break; case 'hard': gameState.cardCount = 12; break; case 'expert': gameState.cardCount = 16; break; case 'demon': gameState.cardCount = 20; break; default: gameState.cardCount = 12; } gameState.totalPairs = gameState.cardCount / 2; if (icons.length < gameState.totalPairs) { console.error("Icons insufficient"); return; } gameState.iconSet = icons.slice(0, gameState.totalPairs); let cardIcons = [...gameState.iconSet, ...gameState.iconSet]; resetGameStatus(); shuffle(cardIcons); createBoard(cardIcons); startTimer(); if (gameState.previewEnabled) previewGame(); }
            function resetGameStatus() { gameState.matchedPairs = 0; gameState.moves = 0; gameState.seconds = 0; gameState.flippedCards = []; gameState.lockBoard = false; gameState.isPreviewing = false; gameState.cards = []; gameMovesDisplay.textContent = gameState.moves; gameTimeDisplay.textContent = formatTime(gameState.seconds); stopTimer(); gameBoard.innerHTML = ''; gameOverModal.classList.remove('active'); }
            function shuffle(a) { for (let i = a.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1));[a[i], a[j]] = [a[j], a[i]]; } }

            // --- MODIFIED: createBoard function for layout ---
            function createBoard(cardIcons) {
                let cols;
                // Determine columns based on card count, max 4
                if (gameState.cardCount === 6) {
                    cols = 3;
                } else { // 8, 10, 12, 16, 20 cards
                    cols = 4;
                }

                gameBoard.style.gridTemplateColumns = `repeat(${cols}, minmax(0, 1fr))`;
                // Adjust gap: 4 cols -> gap-3, 3 cols -> gap-4
                gameBoard.className = `grid gap-${cols === 4 ? 3 : 4} max-w-md w-full`;

                cardIcons.forEach(icon => {
                    const card = document.createElement('div');
                    card.classList.add('card', 'aspect-square');
                    card.dataset.cardId = icon;
                    const pIdx = gameState.iconSet.indexOf(icon);
                    const txtColor = iconTextColors[pIdx % iconTextColors.length];
                    // Card HTML structure
                    card.innerHTML = `
                        <div class="card-inner">
                            <div class="card-face card-back"><i class="fas fa-question"></i></div>
                            <div class="card-face card-front"><i class="fas ${icon} ${txtColor}"></i></div>
                        </div>`;
                    card.addEventListener('click', handleCardClick);
                    gameBoard.appendChild(card);
                    gameState.cards.push(card);
                });
                console.log(`Board created: ${gameState.cardCount} cards, ${cols} columns.`);
            }

            function handleCardClick(e) { if (gameState.lockBoard || gameState.isPreviewing) return; const card = e.currentTarget; if (card.classList.contains('is-flipped') || card.classList.contains('fade-out')) return; flipCard(card); gameState.flippedCards.push(card); if (gameState.flippedCards.length === 2) { gameState.lockBoard = true; incrementMoves(); setTimeout(checkForMatch, 500); } }
            function flipCard(c) { c.classList.add('is-flipped'); playSound('flip'); }
            function unflipCards() { setTimeout(() => { gameState.flippedCards.forEach(c => { if (!c.classList.contains('fade-out')) c.classList.remove('is-flipped'); }); resetFlippedCards(); }, 1000); }
            function checkForMatch() { const [c1, c2] = gameState.flippedCards; const match = c1.dataset.cardId === c2.dataset.cardId; if (match) { playSound('match'); disableCards(); gameState.matchedPairs++; if (gameState.matchedPairs === gameState.totalPairs) endGame(); else resetFlippedCards(); } else { playSound('nomatch'); unflipCards(); } }
            function disableCards() { gameState.flippedCards.forEach(c => { c.classList.add('fade-out'); c.removeEventListener('click', handleCardClick); }); }
            function resetFlippedCards() { gameState.flippedCards = []; gameState.lockBoard = false; }
            function incrementMoves() { gameState.moves++; gameMovesDisplay.textContent = gameState.moves; }
            function startTimer() { stopTimer(); gameState.seconds = 0; gameTimeDisplay.textContent = formatTime(gameState.seconds); gameState.timerInterval = setInterval(() => { gameState.seconds++; gameTimeDisplay.textContent = formatTime(gameState.seconds); }, 1000); }
            function stopTimer() { clearInterval(gameState.timerInterval); gameState.timerInterval = null; }
            function formatTime(s) { const min = Math.floor(s / 60); const sec = s % 60; return `${String(min).padStart(2, '0')}:${String(sec).padStart(2, '0')}`; }
            function previewGame() { if (!gameState.cards || gameState.cards.length === 0) return; console.log("Preview..."); gameState.isPreviewing = true; gameState.lockBoard = true; gameState.cards.forEach(c => c.classList.add('is-flipped')); const pTime = 3000 + (gameState.totalPairs * 200); setTimeout(() => { gameState.cards.forEach(c => c.classList.remove('is-flipped')); gameState.lockBoard = false; gameState.isPreviewing = false; console.log("Preview end."); }, pTime); }
            function endGame() { console.log("Game Over!"); stopTimer(); playSound('win'); const timeFmt = formatTime(gameState.seconds); finalTime.textContent = timeFmt; finalMoves.textContent = gameState.moves; gameOverModal.classList.add('active'); const rec = { difficulty: gameState.difficulty, timeInSeconds: gameState.seconds, timeFormatted: timeFmt, moves: gameState.moves, timestamp: Date.now() }; saveRecord(rec); }
            // Game View Button Listeners
            if (gameBackBtn) gameBackBtn.addEventListener('click', () => { if (confirm('確定離開？')) { stopTimer(); navigateToView('homeView'); } }); if (gamePreviewBtn) gamePreviewBtn.addEventListener('click', () => { if (!gameState.lockBoard && !gameState.isPreviewing) previewGame(); }); if (playAgainBtn) playAgainBtn.addEventListener('click', () => navigateToView('gameView')); if (backToMenuBtn) backToMenuBtn.addEventListener('click', () => navigateToView('homeView'));
            // --- Audio Playback Function (Placeholder) ---
            function playSound(type) { if (!gameState.soundEnabled) return; console.log(`Sound: ${type}`); }
            // --- Initial Setup ---
            loadSettings();
            navigateToView('homeView');

        }); // End DOMContentLoaded
    </script>
